<!-- analytics-teacher.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Records - AttendAce</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared UI Styles -->
  <link rel="stylesheet" href="styles2.css">
</head>

<body class="font-sans max-w-[420px] mx-auto overflow-y-auto relative z-10">

  <!-- GAMING BACKGROUND -->
  <div id="bg-anim"></div>

  <!-- CLICK SOUND -->
  <audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3" preload="auto"></audio>

  <!-- HEADER -->
  <header class="p-4 flex justify-between items-center reveal">
    <h1 class="font-black text-lg tracking-tight">AttendAce</h1>
    <button id="themeToggle" class="px-4 py-2 rounded-full glass text-xs font-bold press min-w-[80px]">
      NOX
    </button>
  </header>

  <section class="px-5 mt-4 reveal">
  <div class="glass p-6 relative overflow-hidden">

    <h2 class="text-2xl font-black mb-6 text-center">Attendance Records</h2>

    <!-- Select Class -->
    <div class="mb-4">
      <label class="block text-sm mb-2 font-semibold">Select Class</label>
      <select id="classSelect"
        class="w-full px-4 py-2 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[var(--accent)]/30">
        <option value="">-- Choose Class --</option>
      </select>
    </div>

    <!-- View Records -->
    <button id="viewRecordsBtn"
      class="w-full py-3 rounded-xl bg-[var(--accent)] text-white font-bold mb-6">
      View Records
    </button>

    <!-- Table Container -->
    <div id="recordsContainer" class="overflow-x-auto hidden">
      <table id="recordsTable" class="min-w-full text-sm border border-gray-200 rounded-xl overflow-hidden">
      </table>
    </div>

    <!-- Export Buttons -->
    <div id="exportButtons" class="hidden mt-6 space-y-3">
      <button id="exportCsvBtn"
        class="w-full py-3 rounded-xl bg-green-600 text-white font-semibold">
        Export CSV
      </button>

      <button id="exportPdfBtn"
        class="w-full py-3 rounded-xl bg-rose-600 text-white font-semibold">
        Export PDF
      </button>
    </div>

    <!-- Back -->
    <div class="mt-10">
      <button class="menu-btn w-full rounded-xl p-4"
              onclick="window.location.href='teacher-dashboard.html'">
        Return to Dashboard
      </button>
    </div>

  </div>
</section>


<script>

// ⚡ Apply mode instantly (before render)
const cachedUser = JSON.parse(localStorage.getItem('user'));

if (cachedUser?.mode === 'gaming') {
  document.body.classList.add('gaming');
  const toggleBtn = document.getElementById('themeToggle');
  if (toggleBtn) toggleBtn.innerText = 'LUMOS';
} else if (cachedUser?.mode === 'official') {
  document.body.classList.remove('gaming');
  const toggleBtn = document.getElementById('themeToggle');
  if (toggleBtn) toggleBtn.innerText = 'NOX';
}

if (cachedUser?.mode === 'gaming') {
  document.querySelectorAll('.scan-icon').forEach(icon => {
    icon.style.filter = 'invert(1)';
  });
} else {
  document.querySelectorAll('.scan-icon').forEach(icon => {
    icon.style.filter = 'invert(0)';
  });
}

/* CLICK SOUND */
const clickSound = document.getElementById('clickSound');

// Play click sound for all buttons and links
document.querySelectorAll('button, a').forEach(el => {
  el.addEventListener('click', () => {
    clickSound.currentTime = 0; // rewind in case still playing
    clickSound.play().catch(err => {
      console.log("Click sound blocked by browser:", err);
    });
  });
});

/* THEME TOGGLE */
const toggle = document.getElementById('themeToggle');
toggle.onclick = () => {
  document.body.classList.toggle('gaming');
  toggle.innerText = document.body.classList.contains('gaming')
    ? 'LUMOS'
    : 'NOX';
};

/* REVEAL ANIMATION */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('show');
  });
}, { threshold: 0.15 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

</script>
<script src="assets/analytics-teacher.js"></script>
</body>
</html>

<!-- scanqr.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Analytics | AttendAce</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Shared UI Styles -->
  <link rel="stylesheet" href="styles2.css">
</head>

<body class="font-sans overflow-y-auto relative z-10">
<!-- GAMING BACKGROUND -->
<div id="bg-anim"></div>

<!-- CLICK SOUND -->
<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3" preload="auto"></audio>

<!-- HEADER -->
<header class="p-4 flex justify-between items-center reveal">
  <h1 class="font-black text-lg tracking-tight">AttendAce</h1>
  <button id="themeToggle" class="px-4 py-2 rounded-full glass text-xs font-bold press min-w-[80px]">
    NOX
  </button>
</header>

<section class="px-5 mt-4 mb-6 reveal">
  <div class="glass max-w-[1200px] mx-auto px-4">

    <h2 class="text-2xl font-black mb-4 text-center mt-4">
      Attendance Analytics
    </h2>

    <!-- KPI -->
    <div class="grid grid-cols-3 gap-3 mb-6 text-center">
      <div class="glass p-3 rounded-xl">
        <p class="text-xs text-[var(--muted)]">Overall</p>
        <p id="overallPercent" class="text-3xl md:text-4xl font-extrabold mt-1">--%</p>
      </div>

      <div class="glass p-3 rounded-xl">
        <p class="text-xs text-[var(--muted)]">Present</p>
        <p id="presentCount" class="text-3xl md:text-4xl font-extrabold mt-1 text-green-600">--</p>
      </div>

      <div class="glass p-3 rounded-xl">
        <p class="text-xs text-[var(--muted)]">Missed</p>
        <p id="missedCount" class="text-3xl md:text-4xl font-extrabold mt-1 text-rose-500">--</p>
      </div>
    </div>

    <!-- Charts -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <div class="glass p-4 rounded-xl">
    <h3 class="font-bold mb-2">By Subject</h3>
    <canvas id="subjectChart" class="w-full h-[300px]"></canvas>
  </div>

  <div class="glass p-4 rounded-xl">
    <h3 class="font-bold mb-2">Last 30 Days</h3>
    <canvas id="trendChart" class="w-full h-[300px]"></canvas>
  </div>
</div>

    <!-- Risk -->
    <div class="mt-6 glass p-4 rounded-xl">
      <h3 class="font-bold mb-2">Subjects at Risk</h3>
      <div id="riskList" class="space-y-2 text-sm">
        Loading...
      </div>
    </div>

    <!-- Back -->
    <div class="mt-12 mb-6">
      <button class="menu-btn w-full rounded-xl p-4"
              onclick="window.location.href='student-dashboard.html'">
        Return to Dashboard
      </button>
    </div>

  </div>
</section>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="assets/analytics-student.js"></script>

<script>

// ⚡ Apply mode instantly (before render)
const cachedUser = JSON.parse(localStorage.getItem('user'));

if (cachedUser?.mode === 'gaming') {
  document.body.classList.add('gaming');
  const toggleBtn = document.getElementById('themeToggle');
  if (toggleBtn) toggleBtn.innerText = 'LUMOS';
} else if (cachedUser?.mode === 'official') {
  document.body.classList.remove('gaming');
  const toggleBtn = document.getElementById('themeToggle');
  if (toggleBtn) toggleBtn.innerText = 'NOX';
}

if (cachedUser?.mode === 'gaming') {
  document.querySelectorAll('.scan-icon').forEach(icon => {
    icon.style.filter = 'invert(1)';
  });
} else {
  document.querySelectorAll('.scan-icon').forEach(icon => {
    icon.style.filter = 'invert(0)';
  });
}

/* CLICK SOUND */
const clickSound = document.getElementById('clickSound');

// Play click sound for all buttons and links
document.querySelectorAll('button, a').forEach(el => {
  el.addEventListener('click', () => {
    clickSound.currentTime = 0; // rewind in case still playing
    clickSound.play().catch(err => {
      console.log("Click sound blocked by browser:", err);
    });
  });
});

/* THEME TOGGLE */
const toggle = document.getElementById('themeToggle');
toggle.onclick = () => {
  document.body.classList.toggle('gaming');
  toggle.innerText = document.body.classList.contains('gaming')
    ? 'LUMOS'
    : 'NOX';
};

/* REVEAL ANIMATION */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('show');
  });
}, { threshold: 0.15 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
